<!DOCTYPE html>
<html>
<head>
  <title>Mehran Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #020617;
      font-size: 24px;
      font-weight: bold;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      margin: 10px;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    h3 {
      margin: 10px 0 5px;
    }

    p {
      margin: 5px 0;
    }

    .btn {
      background: #38bdf8;
      color: black;
      padding: 8px 12px;
      text-decoration: none;
      border-radius: 6px;
      display: inline-block;
      margin-top: 10px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #020617;
    }
  </style>
</head>

<body>

<header>
  Mehran Store 🛒
</header>

<section class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>T-Shirt</h3>

    <a class="btn" href="https://wa.me/918050217782?text=I%20want%20to%20buy%20T-Shirt">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">

    <p>₹1299</p>
    <a class="btn" href="https://wa.me/918050217782?text=I%20want%20to%20buy%20Shoes">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">

    <p>₹899</p>
    <a class="btn" href="https://wa.me/918050217782?text=I%20want%20to%20buy%20Watch">Buy Now</a>
  </div>

</section>

<footer>
  Order on WhatsApp 📞 8050217782

</html>
