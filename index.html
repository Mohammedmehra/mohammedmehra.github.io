<!DOCTYPE html>
<html>
<head>
  <title>Mehran Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #020617;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .price {
      font-size: 18px;
      margin: 5px 0;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 8px 15px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #020617;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  Mehran Store 🛒
</header>

<div class="products">

  <!-- PRODUCT 1 -->
  <div class="card">
    <img src="shirt.jpg">
    <h3>White Shirt</h3>
    <p class="price">₹999</p>
    <a href="https://wa.me/918050217782?text=I want White Shirt">
      <button>Buy Now</button>
    </a>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card">
    <img src="tshirt.jpg">
    <h3>T-Shirt</h3>
    <p class="price">₹499</p>
    <a href="https://wa.me/918050217782?text=I want T-Shirt">
      <button>Buy Now</button>
    </a>
  </div>

  <!-- PRODUCT 3 -->
  <div class="card">
    <img src="watch.jpg">
    <h3>Watch</h3>
    <p class="price">₹899</p>
    <a href="https://wa.me/918050217782?text=I want Watch">
      <button>Buy Now</button>
    </a>
  </div>

</div>

<footer>
  Order on WhatsApp 📞 8050217782
</footer>

</body>
</html>
